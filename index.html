<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>明慧廣播電台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1410;
  --bg-card: #241e17;
  --bg-card-hover: #2e261d;
  --gold: #c8a96e;
  --gold-dim: #a08050;
  --gold-bright: #e0c080;
  --paper: #f5f0e8;
  --paper-dim: #d0c8b8;
  --tab-bg: #0f0d0a;
  --chip-bg: #2a2218;
  --chip-active: #c8a96e;
}
html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--paper);
  font-family: 'Noto Sans TC', sans-serif;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Layout ── */
#app {
  display: flex; flex-direction: column;
  height: 100%; max-width: 500px; margin: 0 auto;
  position: relative;
}

/* ── Header ── */
.header {
  padding: 16px 20px 10px;
  text-align: center;
  flex-shrink: 0;
}
.header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  color: var(--gold);
  letter-spacing: 4px;
}
.header .subtitle {
  font-size: 11px;
  color: var(--gold-dim);
  margin-top: 2px;
  letter-spacing: 2px;
}

/* ── Player Bar ── */
.player-bar {
  flex-shrink: 0;
  background: var(--bg-card);
  border: 1px solid #3a3028;
  border-radius: 14px;
  margin: 0 12px 8px;
  padding: 12px 16px;
}
.player-now {
  font-size: 13px;
  color: var(--paper);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 8px;
  min-height: 20px;
}
.player-now.empty { color: var(--gold-dim); }
.player-progress {
  width: 100%;
  height: 4px;
  background: #3a3028;
  border-radius: 2px;
  margin-bottom: 8px;
  cursor: pointer;
  position: relative;
}
.player-progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s linear;
}
.player-time {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--gold-dim);
  margin-bottom: 8px;
}
.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
}
.player-btn {
  background: none; border: none;
  color: var(--paper);
  font-size: 22px;
  cursor: pointer;
  padding: 6px;
  border-radius: 50%;
  transition: background 0.2s;
  line-height: 1;
}
.player-btn:active { background: rgba(200,169,110,0.15); }
.player-btn.play {
  width: 50px; height: 50px;
  background: var(--gold);
  color: var(--bg);
  font-size: 24px;
  display: flex; align-items: center; justify-content: center;
}
.player-btn.play:active { background: var(--gold-bright); }

/* ── Chip Bar ── */
.chip-bar {
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  padding: 6px 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.chip-bar::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--chip-bg);
  color: var(--paper-dim);
  font-size: 13px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.chip.active {
  background: var(--gold);
  color: var(--bg);
  font-weight: 500;
}

/* ── Program List ── */
.program-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
  scrollbar-width: thin;
  scrollbar-color: #3a3028 transparent;
}
.program-item {
  background: var(--bg-card);
  border: 1px solid #2e261d;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.program-item:active,
.program-item.active {
  background: var(--bg-card-hover);
  border-color: var(--gold-dim);
}
.program-item .idx {
  font-size: 13px;
  color: var(--gold-dim);
  min-width: 24px;
  text-align: center;
}
.program-item .info { flex: 1; min-width: 0; }
.program-item .title {
  font-size: 14px;
  color: var(--paper);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.program-item .date {
  font-size: 11px;
  color: var(--gold-dim);
  margin-top: 2px;
}
.program-item .play-icon {
  color: var(--gold);
  font-size: 18px;
  flex-shrink: 0;
}

/* ── Loading / Empty ── */
.loading, .empty-msg {
  text-align: center;
  padding: 40px 20px;
  color: var(--gold-dim);
  font-size: 14px;
}
.loading::after {
  content: '';
  display: block;
  width: 28px; height: 28px;
  border: 2px solid var(--gold-dim);
  border-top-color: var(--gold);
  border-radius: 50%;
  margin: 12px auto 0;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Pagination ── */
.pagination {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 10px 0 16px;
}
.page-btn {
  padding: 8px 20px;
  border-radius: 20px;
  background: var(--chip-bg);
  color: var(--paper-dim);
  border: 1px solid #3a3028;
  font-size: 13px;
  cursor: pointer;
}
.page-btn:disabled { opacity: 0.3; cursor: default; }
.page-btn:not(:disabled):active { background: var(--gold); color: var(--bg); }

/* ── Tab Bar ── */
.tab-bar {
  flex-shrink: 0;
  display: flex;
  background: var(--tab-bg);
  border-top: 1px solid #2a2218;
  padding: 6px 0 env(safe-area-inset-bottom, 8px);
}
.tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 4px 4px;
  cursor: pointer;
  color: var(--paper-dim);
  font-size: 11px;
  border: none; background: none;
  transition: color 0.2s;
}
.tab .icon { font-size: 20px; }
.tab.active { color: var(--gold); }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <h1>明慧廣播電台</h1>
    <div class="subtitle">MINGHUI RADIO</div>
  </div>

  <!-- Player Bar -->
  <div class="player-bar">
    <div class="player-now empty" id="playerTitle">選擇節目開始播放</div>
    <div class="player-progress" id="progressBar">
      <div class="player-progress-fill" id="progressFill"></div>
    </div>
    <div class="player-time">
      <span id="timeCurrent">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>
    <div class="player-controls">
      <button class="player-btn" id="btnPrev" title="上一集">⏮</button>
      <button class="player-btn play" id="btnPlay" title="播放">▶</button>
      <button class="player-btn" id="btnNext" title="下一集">⏭</button>
    </div>
  </div>

  <!-- Chip Bar (subcategories) -->
  <div class="chip-bar" id="chipBar"></div>

  <!-- Program List -->
  <div class="program-list" id="programList"></div>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="live">
      <span class="icon">📡</span>即時短波
    </button>
    <button class="tab" data-tab="cultivation">
      <span class="icon">🙏</span>修煉園地
    </button>
    <button class="tab" data-tab="news">
      <span class="icon">📰</span>新聞時事
    </button>
    <button class="tab" data-tab="music">
      <span class="icon">🎵</span>音樂欣賞
    </button>
  </div>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
// ── Config ──
const PROXY = 'RAILWAY_URL_PLACEHOLDER/fetch?url=';
const BASE = 'https://www.mhradio.org';

// ── Category Data ──
const TABS = {
  live: {
    label: '即時短波',
    subs: [
      { name: '明慧時事', id: 144 },
      { name: '修煉交流', id: 145 }
    ]
  },
  cultivation: {
    label: '修煉園地',
    subs: [
      { name: '修煉故事', id: 131 },
      { name: '空中明慧週刊', id: 46 },
      { name: '正法修煉交流選編', id: 141 },
      { name: '明慧小弟子園地', id: 138 },
      { name: '明慧大陸法會', id: 66 },
      { name: '明慧文章專輯選', id: 142 },
      { name: '憶師恩', id: 137 },
      { name: '法輪大法日專輯', id: 132 },
      { name: '真相廣播稿', id: 57 }
    ]
  },
  news: {
    label: '新聞時事',
    subs: [
      { name: '大陸消息', id: 139 },
      { name: '海外消息', id: 140 },
      { name: '空中明慧週報', id: 50 },
      { name: '大法弘傳故事', id: 87 },
      { name: '傳統文化', id: 86 },
      { name: '善惡一念間', id: 53 },
      { name: '明慧叢書', id: 143 }
    ]
  },
  music: {
    label: '音樂欣賞',
    subs: [
      { name: '普度', id: 'showprogram/20', type: 'program' },
      { name: '濟世', id: 'showprogram/71', type: 'program' },
      { name: '天音淨樂', id: 40 },
      { name: '煉功音樂', id: null, type: 'external', url: 'https://www.mhradio.org/showprogram/127.html' }
    ]
  }
};

// ── State ──
let currentTab = 'live';
let currentSub = null;
let currentPage = 1;
let programs = [];
let currentIndex = -1;
let isPlaying = false;

// ── DOM ──
const audio = document.getElementById('audioPlayer');
const playerTitle = document.getElementById('playerTitle');
const progressFill = document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const timeCurrent = document.getElementById('timeCurrent');
const timeDuration = document.getElementById('timeDuration');
const btnPlay = document.getElementById('btnPlay');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const chipBar = document.getElementById('chipBar');
const programList = document.getElementById('programList');
const tabBar = document.getElementById('tabBar');

// ── Tab Bar ──
tabBar.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const key = tab.dataset.tab;
  if (key === currentTab) return;
  currentTab = key;
  tabBar.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === key));
  renderChips();
});

// ── Chips ──
function renderChips() {
  const subs = TABS[currentTab].subs;
  chipBar.innerHTML = subs.map((s, i) =>
    `<div class="chip${i === 0 ? ' active' : ''}" data-idx="${i}">${s.name}</div>`
  ).join('');
  currentSub = subs[0];
  currentPage = 1;
  loadSubcategory();

  chipBar.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      chipBar.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      currentSub = subs[+c.dataset.idx];
      currentPage = 1;
      loadSubcategory();
    });
  });
}

// ── Load Subcategory ──
async function loadSubcategory() {
  if (!currentSub) return;

  // External link
  if (currentSub.type === 'external') {
    programList.innerHTML = `<div class="empty-msg">
      <p style="margin-bottom:12px">煉功音樂</p>
      <a href="${currentSub.url}" target="_blank"
         style="color:var(--gold);text-decoration:underline;font-size:14px">
        前往收聽 →
      </a>
    </div>`;
    return;
  }

  // Single program (music)
  if (currentSub.type === 'program') {
    programList.innerHTML = '<div class="loading">載入中…</div>';
    await loadProgramDirectly(currentSub.id);
    return;
  }

  // Category listing
  programList.innerHTML = '<div class="loading">載入中…</div>';
  const url = `${BASE}/showcategory/${currentSub.id}/${currentPage}.html`;

  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const html = await res.text();
    parseAndRenderList(html);
  } catch (err) {
    programList.innerHTML = `<div class="empty-msg">載入失敗，請稍後再試<br><small>${err.message}</small></div>`;
  }
}

// ── Parse Category Page ──
function parseAndRenderList(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const links = doc.querySelectorAll('a[href*="showprogram/"]');
  programs = [];
  const seen = new Set();

  links.forEach(a => {
    const href = a.getAttribute('href') || '';
    const match = href.match(/showprogram\/(\d+)/);
    if (!match) return;
    const pid = match[1];
    if (seen.has(pid)) return;
    seen.add(pid);
    const text = a.textContent.trim();
    if (!text) return;
    programs.push({ id: pid, title: text, href: href });
  });

  if (programs.length === 0) {
    programList.innerHTML = '<div class="empty-msg">暫無節目</div>';
    return;
  }

  let listHtml = programs.map((p, i) =>
    `<div class="program-item${i === currentIndex ? ' active' : ''}" data-idx="${i}">
      <span class="idx">${i + 1}</span>
      <div class="info">
        <div class="title">${p.title}</div>
      </div>
      <span class="play-icon">▶</span>
    </div>`
  ).join('');

  // Pagination
  listHtml += `<div class="pagination">
    <button class="page-btn" id="pagePrev" ${currentPage <= 1 ? 'disabled' : ''}>← 上一頁</button>
    <button class="page-btn" id="pageNext">下一頁 →</button>
  </div>`;

  programList.innerHTML = listHtml;

  programList.querySelectorAll('.program-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = +el.dataset.idx;
      playProgram(idx);
    });
  });

  const pagePrev = document.getElementById('pagePrev');
  const pageNext = document.getElementById('pageNext');
  if (pagePrev) pagePrev.addEventListener('click', () => { currentPage--; loadSubcategory(); });
  if (pageNext) pageNext.addEventListener('click', () => { currentPage++; loadSubcategory(); });
}

// ── Load Single Program (for music tab) ──
async function loadProgramDirectly(programPath) {
  const url = `${BASE}/${programPath}.html`;
  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const mp3Link = findMp3(doc);
    if (mp3Link) {
      const title = doc.querySelector('title')?.textContent?.trim() || currentSub.name;
      programs = [{ id: programPath, title: title, mp3: mp3Link }];
      currentIndex = 0;

      programList.innerHTML = `<div class="program-item active" data-idx="0">
        <span class="idx">1</span>
        <div class="info"><div class="title">${title}</div></div>
        <span class="play-icon">▶</span>
      </div>`;

      startAudio(mp3Link, title);
    } else {
      programList.innerHTML = '<div class="empty-msg">找不到音頻檔案</div>';
    }
  } catch (err) {
    programList.innerHTML = `<div class="empty-msg">載入失敗<br><small>${err.message}</small></div>`;
  }
}

// ── Play Program ──
async function playProgram(idx) {
  currentIndex = idx;
  const prog = programs[idx];

  // Highlight active
  programList.querySelectorAll('.program-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  playerTitle.textContent = prog.title;
  playerTitle.classList.remove('empty');

  if (prog.mp3) {
    startAudio(prog.mp3, prog.title);
    return;
  }

  // Fetch program page to find mp3
  playerTitle.textContent = '載入中…';
  const href = prog.href.startsWith('http') ? prog.href : `${BASE}/${prog.href.replace(/^\//, '')}`;

  try {
    const res = await fetch(PROXY + encodeURIComponent(href));
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const mp3 = findMp3(doc);
    if (mp3) {
      prog.mp3 = mp3;
      playerTitle.textContent = prog.title;
      startAudio(mp3, prog.title);
    } else {
      playerTitle.textContent = '找不到音頻';
      playerTitle.classList.add('empty');
    }
  } catch (err) {
    playerTitle.textContent = '載入失敗';
    playerTitle.classList.add('empty');
  }
}

// ── Find MP3 in HTML ──
function findMp3(doc) {
  // Check <source> and <audio>
  const source = doc.querySelector('source[src*=".mp3"], audio[src*=".mp3"]');
  if (source) {
    const src = source.getAttribute('src');
    return src.startsWith('http') ? src : `${BASE}${src.startsWith('/') ? '' : '/'}${src}`;
  }
  // Check links
  const links = doc.querySelectorAll('a[href*=".mp3"]');
  if (links.length > 0) {
    const href = links[0].getAttribute('href');
    return href.startsWith('http') ? href : `${BASE}${href.startsWith('/') ? '' : '/'}${href}`;
  }
  // Check in raw HTML
  const raw = doc.documentElement.innerHTML;
  const match = raw.match(/https?:\/\/[^\s"'<>]+\.mp3/i);
  return match ? match[0] : null;
}

// ── Audio Playback ──
function startAudio(mp3Url, title) {
  // Proxy the mp3 too for CORS
  audio.src = PROXY + encodeURIComponent(mp3Url);
  audio.play().then(() => {
    isPlaying = true;
    btnPlay.textContent = '⏸';
  }).catch(() => {
    // Autoplay blocked — user will click play
    isPlaying = false;
    btnPlay.textContent = '▶';
  });
}

// ── Player Controls ──
btnPlay.addEventListener('click', () => {
  if (!audio.src) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    btnPlay.textContent = '▶';
  } else {
    audio.play();
    isPlaying = true;
    btnPlay.textContent = '⏸';
  }
});

btnPrev.addEventListener('click', () => {
  if (currentIndex > 0) playProgram(currentIndex - 1);
});

btnNext.addEventListener('click', () => {
  if (currentIndex < programs.length - 1) playProgram(currentIndex + 1);
});

// Auto-play next
audio.addEventListener('ended', () => {
  if (currentIndex < programs.length - 1) {
    playProgram(currentIndex + 1);
  } else {
    isPlaying = false;
    btnPlay.textContent = '▶';
  }
});

// ── Progress Bar ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  timeCurrent.textContent = formatTime(audio.currentTime);
  timeDuration.textContent = formatTime(audio.duration);
});

progressBar.addEventListener('click', e => {
  if (!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

audio.addEventListener('play', () => { isPlaying = true; btnPlay.textContent = '⏸'; });
audio.addEventListener('pause', () => { isPlaying = false; btnPlay.textContent = '▶'; });

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ── Init ──
renderChips();
</script>
</body>
</html>
