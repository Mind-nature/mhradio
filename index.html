<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>明慧廣播電台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1410;
  --bg-card: #241e17;
  --bg-card-hover: #2e261d;
  --gold: #c8a96e;
  --gold-dim: #a08050;
  --gold-bright: #e0c080;
  --paper: #f5f0e8;
  --paper-dim: #d0c8b8;
  --tab-bg: #0f0d0a;
  --chip-bg: #2a2218;
  --chip-active: #c8a96e;
}
html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--paper);
  font-family: 'Noto Sans TC', sans-serif;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Layout ── */
#app {
  display: flex; flex-direction: column;
  height: 100%; max-width: 500px; margin: 0 auto;
  position: relative;
}

/* ── Header ── */
.header {
  padding: 16px 20px 10px;
  text-align: center;
  flex-shrink: 0;
}
.header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  color: var(--gold);
  letter-spacing: 4px;
}
.header .subtitle {
  font-size: 11px;
  color: var(--gold-dim);
  margin-top: 2px;
  letter-spacing: 2px;
}

/* ── Player Bar ── */
.player-bar {
  flex-shrink: 0;
  background: var(--bg-card);
  border: 1px solid #3a3028;
  border-radius: 14px;
  margin: 0 12px 8px;
  padding: 12px 16px;
}
.player-now {
  font-size: 13px;
  color: var(--paper);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 8px;
  min-height: 20px;
}
.player-now.empty { color: var(--gold-dim); }
.player-progress {
  width: 100%;
  height: 6px;
  background: #3a3028;
  border-radius: 3px;
  margin-bottom: 8px;
  cursor: pointer;
  position: relative;
  touch-action: none;
}
.player-progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 3px;
  width: 0%;
  pointer-events: none;
}
.player-progress-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 14px; height: 14px;
  background: var(--gold-bright);
  border-radius: 50%;
  pointer-events: none;
  display: none;
}
.player-progress.has-audio .player-progress-thumb { display: block; }
.player-time {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--gold-dim);
  margin-bottom: 8px;
}
.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
}
.player-btn {
  background: none; border: none;
  color: var(--paper);
  font-size: 22px;
  cursor: pointer;
  padding: 6px;
  border-radius: 50%;
  transition: background 0.2s;
  line-height: 1;
}
.player-btn:active { background: rgba(200,169,110,0.15); }
.player-btn.play {
  width: 50px; height: 50px;
  background: var(--gold);
  color: var(--bg);
  font-size: 24px;
  display: flex; align-items: center; justify-content: center;
}
.player-btn.play:active { background: var(--gold-bright); }

/* ── Chip Bar ── */
.chip-bar {
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  padding: 6px 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.chip-bar::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--chip-bg);
  color: var(--paper-dim);
  font-size: 13px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.chip.active {
  background: var(--gold);
  color: var(--bg);
  font-weight: 500;
}

/* ── Program List ── */
.program-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
  scrollbar-width: thin;
  scrollbar-color: #3a3028 transparent;
}
.program-item {
  background: var(--bg-card);
  border: 1px solid #2e261d;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.program-item:active,
.program-item.active {
  background: var(--bg-card-hover);
  border-color: var(--gold-dim);
}
.program-item .idx {
  font-size: 13px;
  color: var(--gold-dim);
  min-width: 24px;
  text-align: center;
}
.program-item .info { flex: 1; min-width: 0; }
.program-item .title {
  font-size: 14px;
  color: var(--paper);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.program-item .date {
  font-size: 11px;
  color: var(--gold-dim);
  margin-top: 2px;
}
.program-item .play-icon {
  color: var(--gold);
  font-size: 18px;
  flex-shrink: 0;
}

/* ── Loading / Empty ── */
.loading, .empty-msg {
  text-align: center;
  padding: 40px 20px;
  color: var(--gold-dim);
  font-size: 14px;
}
.loading::after {
  content: '';
  display: block;
  width: 28px; height: 28px;
  border: 2px solid var(--gold-dim);
  border-top-color: var(--gold);
  border-radius: 50%;
  margin: 12px auto 0;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Pagination ── */
.pagination {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 10px 0 16px;
}
.page-btn {
  padding: 8px 20px;
  border-radius: 20px;
  background: var(--chip-bg);
  color: var(--paper-dim);
  border: 1px solid #3a3028;
  font-size: 13px;
  cursor: pointer;
}
.page-btn:disabled { opacity: 0.3; cursor: default; }
.page-btn:not(:disabled):active { background: var(--gold); color: var(--bg); }

/* ── Tab Bar ── */
.tab-bar {
  flex-shrink: 0;
  display: flex;
  background: var(--tab-bg);
  border-top: 1px solid #2a2218;
  padding: 6px 0 env(safe-area-inset-bottom, 8px);
}
.tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 4px 4px;
  cursor: pointer;
  color: var(--paper-dim);
  font-size: 11px;
  border: none; background: none;
  transition: color 0.2s;
}
.tab .icon { font-size: 20px; }
.tab.active { color: var(--gold); }
.tab.active::after {
  content: '';
  display: block;
  width: 20px; height: 3px;
  background: var(--gold);
  border-radius: 2px;
  margin-top: 2px;
}

/* ── Home Page ── */
.home-section {
  margin-bottom: 16px;
}
.home-section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 16px;
  color: var(--gold);
  padding: 8px 4px;
  border-bottom: 1px solid #2e261d;
  margin-bottom: 8px;
}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <h1>明慧廣播電台</h1>
    <div class="subtitle">MINGHUI RADIO</div>
  </div>

  <!-- Player Bar -->
  <div class="player-bar">
    <div class="player-now empty" id="playerTitle">選擇節目開始播放</div>
    <div class="player-progress" id="progressBar">
      <div class="player-progress-fill" id="progressFill"></div>
      <div class="player-progress-thumb" id="progressThumb"></div>
    </div>
    <div class="player-time">
      <span id="timeCurrent">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>
    <div class="player-controls">
      <button class="player-btn" id="btnPrev" title="上一集">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="player-btn play" id="btnPlay" title="播放" data-state="paused">
        <svg class="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <button class="player-btn" id="btnNext" title="下一集">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Chip Bar (subcategories) -->
  <div class="chip-bar" id="chipBar"></div>

  <!-- Program List -->
  <div class="program-list" id="programList"></div>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="home">
      <span class="icon">🏠</span>首頁
    </button>
    <button class="tab" data-tab="live">
      <span class="icon">📡</span>短波收聽
    </button>
    <button class="tab" data-tab="cultivation">
      <span class="icon">🙏</span>修煉園地
    </button>
    <button class="tab" data-tab="news">
      <span class="icon">📰</span>新聞時事
    </button>
    <button class="tab" data-tab="music">
      <span class="icon">🎵</span>音樂欣賞
    </button>
  </div>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
// ── Config ──
const PROXY = (location.hostname === 'localhost' || location.protocol === 'file:')
  ? 'https://mhradio.up.railway.app/fetch?url='
  : '/fetch?url=';
const BASE = 'https://www.mhradio.org';

// ── Category Data ──
const TABS = {
  live: {
    label: '短波收聽',
    subs: [
      { name: '明慧時事', id: 144 },
      { name: '修煉交流', id: 145 }
    ]
  },
  cultivation: {
    label: '修煉園地',
    subs: [
      { name: '修煉故事', id: 131 },
      { name: '空中明慧週刊', id: 46 },
      { name: '正法修煉交流選編', id: 141 },
      { name: '明慧小弟子園地', id: 138 },
      { name: '明慧大陸法會', id: 66 },
      { name: '明慧文章專輯選', id: 142 },
      { name: '憶師恩', id: 137 },
      { name: '法輪大法日專輯', id: 132 },
      { name: '真相廣播稿', id: 57 }
    ]
  },
  news: {
    label: '新聞時事',
    subs: [
      { name: '大陸消息', id: 139 },
      { name: '海外消息', id: 140 },
      { name: '空中明慧週報', id: 50 },
      { name: '大法弘傳故事', id: 87 },
      { name: '傳統文化', id: 86 },
      { name: '善惡一念間', id: 53 },
      { name: '明慧叢書', id: 143 }
    ]
  },
  music: {
    label: '音樂欣賞',
    subs: [
      { name: '普度', id: 'showprogram/20', type: 'program' },
      { name: '濟世', id: 'showprogram/71', type: 'program' },
      { name: '天音淨樂', id: 40 }
    ]
  }
};

// ── State ──
let currentTab = 'home';
let currentSub = null;
let currentPage = 1;
let programs = [];
let currentIndex = -1;
let isPlaying = false;

// ── DOM ──
const audio = document.getElementById('audioPlayer');
const playerTitle = document.getElementById('playerTitle');
const progressFill = document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const timeCurrent = document.getElementById('timeCurrent');
const timeDuration = document.getElementById('timeDuration');
const btnPlay = document.getElementById('btnPlay');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const chipBar = document.getElementById('chipBar');
const programList = document.getElementById('programList');
const tabBar = document.getElementById('tabBar');

// ── Tab Bar ──
tabBar.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const key = tab.dataset.tab;
  if (key === currentTab) return;
  currentTab = key;
  tabBar.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === key));
  renderChips();
});

// ── Chips ──
function renderChips() {
  if (currentTab === 'home') {
    chipBar.innerHTML = '';
    loadHomePage();
    return;
  }
  const subs = TABS[currentTab].subs;
  chipBar.innerHTML = subs.map((s, i) =>
    `<div class="chip${i === 0 ? ' active' : ''}" data-idx="${i}">${s.name}</div>`
  ).join('');
  currentSub = subs[0];
  currentPage = 1;
  loadSubcategory();

  chipBar.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      chipBar.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      currentSub = subs[+c.dataset.idx];
      currentPage = 1;
      loadSubcategory();
    });
  });
}

// ── Home Page ──
function getToday6amTW() {
  // Taiwan time = UTC+8
  const now = Date.now();
  const twNow = now + 8 * 3600000;
  const twDay = Math.floor(twNow / 86400000);
  const tw6am = twDay * 86400000 - 8 * 3600000 + 6 * 3600000; // 6am UTC+8 in UTC ms
  return now >= tw6am ? tw6am : tw6am - 86400000;
}

async function loadHomePage() {
  const cacheKey = 'mhradio_home';
  const cacheTimeKey = 'mhradio_home_time';
  const cached = localStorage.getItem(cacheKey);
  const cachedTime = parseInt(localStorage.getItem(cacheTimeKey) || '0');
  const today6am = getToday6amTW();

  // Use cache if fetched after today's 6am
  if (cached && cachedTime >= today6am) {
    renderHomePage(cached);
    return;
  }

  programList.innerHTML = '<div class="loading">載入中…</div>';
  try {
    const res = await fetch(PROXY + encodeURIComponent(BASE + '/'));
    const html = await res.text();
    localStorage.setItem(cacheKey, html);
    localStorage.setItem(cacheTimeKey, Date.now().toString());
    renderHomePage(html);
  } catch (err) {
    programList.innerHTML = `<div class="empty-msg">載入失敗<br><small>${err.message}</small></div>`;
  }
}

function renderHomePage(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const tables = doc.querySelectorAll('table');
  let latestItems = [];
  let popularItems = [];

  tables.forEach(table => {
    const rows = table.querySelectorAll('tr');
    const items = [];
    rows.forEach(row => {
      const link = row.querySelector('a[href*="showprogram/"]');
      if (!link) return;
      const href = link.getAttribute('href') || '';
      const title = link.textContent.trim();
      const cells = row.querySelectorAll('td');
      let date = '', duration = '';
      cells.forEach(cell => {
        const text = cell.textContent.trim();
        if (/^\d{4}\/\d{2}\/\d{2}$/.test(text)) date = text;
        if (/分$/.test(text)) duration = text;
      });
      if (title) items.push({ title, href, date, duration });
    });
    if (items.length > 0) {
      if (latestItems.length === 0) latestItems = items;
      else if (popularItems.length === 0) popularItems = items;
    }
  });

  if (latestItems.length === 0) {
    const allLinks = doc.querySelectorAll('a[href*="showprogram/"]');
    const seen = new Set();
    allLinks.forEach(a => {
      const href = a.getAttribute('href') || '';
      const match = href.match(/showprogram\/(\d+)/);
      if (!match || seen.has(match[1])) return;
      if (SIDEBAR_IDS.has(match[1])) return;
      seen.add(match[1]);
      const title = a.textContent.trim();
      if (title) latestItems.push({ title, href, date: '', duration: '' });
    });
  }

  let content = '';
  if (latestItems.length > 0) {
    content += `<div class="home-section">
      <div class="home-section-title">📻 最新收聽</div>
      ${latestItems.map((p, i) => `<div class="program-item" data-href="${p.href}">
        <span class="idx">${i + 1}</span>
        <div class="info">
          <div class="title">${p.title}</div>
          <div class="date">${[p.date, p.duration].filter(Boolean).join(' · ')}</div>
        </div>
        <span class="play-icon">▶</span>
      </div>`).join('')}
    </div>`;
  }
  if (popularItems.length > 0) {
    content += `<div class="home-section">
      <div class="home-section-title">🔥 熱門節目</div>
      ${popularItems.map((p, i) => `<div class="program-item" data-href="${p.href}">
        <span class="idx">${i + 1}</span>
        <div class="info">
          <div class="title">${p.title}</div>
          <div class="date">${[p.date, p.duration].filter(Boolean).join(' · ')}</div>
        </div>
        <span class="play-icon">▶</span>
      </div>`).join('')}
    </div>`;
  }
  if (!content) content = '<div class="empty-msg">暫無資料</div>';

  programList.innerHTML = content;

  programList.querySelectorAll('.program-item[data-href]').forEach(el => {
    el.addEventListener('click', async () => {
      const href = el.dataset.href;
      const title = el.querySelector('.title').textContent;
      playerTitle.textContent = '載入中…';
      playerTitle.classList.remove('empty');
      const fullUrl = href.startsWith('http') ? href : `${BASE}/${href.replace(/^\//, '')}`;
      try {
        const r = await fetch(PROXY + encodeURIComponent(fullUrl));
        const h = await r.text();
        const d = new DOMParser().parseFromString(h, 'text/html');
        const mp3 = findMp3(d);
        if (mp3) {
          programs = [{ id: href, title, mp3, href }];
          currentIndex = 0;
          playerTitle.textContent = title;
          startAudio(mp3, title);
          programList.querySelectorAll('.program-item').forEach(x => x.classList.remove('active'));
          el.classList.add('active');
        } else {
          playerTitle.textContent = '找不到音頻';
          playerTitle.classList.add('empty');
        }
      } catch (err) {
        playerTitle.textContent = '載入失敗';
        playerTitle.classList.add('empty');
      }
    });
  });
}

// ── Load Subcategory ──
async function loadSubcategory() {
  if (!currentSub) return;

  // External link
  if (currentSub.type === 'external') {
    programList.innerHTML = `<div class="empty-msg">
      <p style="margin-bottom:12px">煉功音樂</p>
      <a href="${currentSub.url}" target="_blank"
         style="color:var(--gold);text-decoration:underline;font-size:14px">
        前往收聽 →
      </a>
    </div>`;
    return;
  }

  // Single program (music)
  if (currentSub.type === 'program') {
    programList.innerHTML = '<div class="loading">載入中…</div>';
    await loadProgramDirectly(currentSub.id);
    return;
  }

  // Category listing
  const cacheKey = `mhradio_cat_${currentSub.id}_${currentPage}`;
  const cacheTimeKey = cacheKey + '_time';
  const cached = localStorage.getItem(cacheKey);
  const cachedTime = parseInt(localStorage.getItem(cacheTimeKey) || '0');
  const today6am = getToday6amTW();

  if (cached && cachedTime >= today6am) {
    parseAndRenderList(cached);
    return;
  }

  programList.innerHTML = '<div class="loading">載入中…</div>';
  const url = `${BASE}/showcategory/${currentSub.id}/${currentPage}.html`;

  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const html = await res.text();
    localStorage.setItem(cacheKey, html);
    localStorage.setItem(cacheTimeKey, Date.now().toString());
    parseAndRenderList(html);
  } catch (err) {
    programList.innerHTML = `<div class="empty-msg">載入失敗，請稍後再試<br><small>${err.message}</small></div>`;
  }
}

// ── Parse Category Page ──
// Sidebar program IDs to exclude (普度, 濟世, 煉功音樂 etc.)
const SIDEBAR_IDS = new Set(['20', '71', '127', '128']);

function parseAndRenderList(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  // Try main content area first, fallback to full page
  const container = doc.querySelector('.main-content, .content, .program-list, #content, article') || doc;
  const links = container.querySelectorAll('a[href*="showprogram/"]');
  programs = [];
  const seen = new Set();

  links.forEach(a => {
    const href = a.getAttribute('href') || '';
    const match = href.match(/showprogram\/(\d+)/);
    if (!match) return;
    const pid = match[1];
    if (seen.has(pid)) return;
    if (SIDEBAR_IDS.has(pid)) return; // skip sidebar links
    seen.add(pid);
    const text = a.textContent.trim();
    if (!text) return;
    programs.push({ id: pid, title: text, href: href });
  });

  if (programs.length === 0) {
    programList.innerHTML = '<div class="empty-msg">暫無節目</div>';
    return;
  }

  let listHtml = programs.map((p, i) =>
    `<div class="program-item${i === currentIndex ? ' active' : ''}" data-idx="${i}">
      <span class="idx">${i + 1}</span>
      <div class="info">
        <div class="title">${p.title}</div>
      </div>
      <span class="play-icon">▶</span>
    </div>`
  ).join('');

  // Pagination
  listHtml += `<div class="pagination">
    <button class="page-btn" id="pagePrev" ${currentPage <= 1 ? 'disabled' : ''}>← 上一頁</button>
    <button class="page-btn" id="pageNext">下一頁 →</button>
  </div>`;

  programList.innerHTML = listHtml;

  programList.querySelectorAll('.program-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = +el.dataset.idx;
      playProgram(idx);
    });
  });

  const pagePrev = document.getElementById('pagePrev');
  const pageNext = document.getElementById('pageNext');
  if (pagePrev) pagePrev.addEventListener('click', () => { currentPage--; loadSubcategory(); });
  if (pageNext) pageNext.addEventListener('click', () => { currentPage++; loadSubcategory(); });
}

// ── Load Single Program (for music tab) ──
async function loadProgramDirectly(programPath) {
  const cacheKey = `mhradio_prog_${programPath.replace(/\//g, '_')}`;
  const cacheTimeKey = cacheKey + '_time';
  const cached = localStorage.getItem(cacheKey);
  const cachedTime = parseInt(localStorage.getItem(cacheTimeKey) || '0');
  const today6am = getToday6amTW();

  let html;
  if (cached && cachedTime >= today6am) {
    html = cached;
  } else {
    const url = `${BASE}/${programPath}.html`;
    try {
      const res = await fetch(PROXY + encodeURIComponent(url));
      html = await res.text();
      localStorage.setItem(cacheKey, html);
      localStorage.setItem(cacheTimeKey, Date.now().toString());
    } catch (err) {
      programList.innerHTML = `<div class="empty-msg">載入失敗<br><small>${err.message}</small></div>`;
      return;
    }
  }
  try {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const mp3Link = findMp3(doc);
    if (mp3Link) {
      const title = doc.querySelector('title')?.textContent?.trim() || currentSub.name;
      programs = [{ id: programPath, title: title, mp3: mp3Link }];
      currentIndex = -1;

      programList.innerHTML = `<div class="program-item" data-idx="0">
        <span class="idx">1</span>
        <div class="info"><div class="title">${title}</div></div>
        <span class="play-icon">▶</span>
      </div>`;

      programList.querySelector('.program-item').addEventListener('click', () => {
        playProgram(0);
      });
    } else {
      programList.innerHTML = '<div class="empty-msg">找不到音頻檔案</div>';
    }
  } catch (err) {
    programList.innerHTML = `<div class="empty-msg">載入失敗<br><small>${err.message}</small></div>`;
  }
}

// ── Play Program ──
async function playProgram(idx) {
  currentIndex = idx;
  const prog = programs[idx];

  // Highlight active
  programList.querySelectorAll('.program-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  playerTitle.textContent = prog.title;
  playerTitle.classList.remove('empty');

  if (prog.mp3) {
    startAudio(prog.mp3, prog.title);
    return;
  }

  // Fetch program page to find mp3
  playerTitle.textContent = '載入中…';
  const href = prog.href.startsWith('http') ? prog.href : `${BASE}/${prog.href.replace(/^\//, '')}`;

  try {
    const res = await fetch(PROXY + encodeURIComponent(href));
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const mp3 = findMp3(doc);
    if (mp3) {
      prog.mp3 = mp3;
      playerTitle.textContent = prog.title;
      startAudio(mp3, prog.title);
    } else {
      playerTitle.textContent = '找不到音頻';
      playerTitle.classList.add('empty');
    }
  } catch (err) {
    playerTitle.textContent = '載入失敗';
    playerTitle.classList.add('empty');
  }
}

// ── Find MP3 in HTML ──
function findMp3(doc) {
  // Check <source> and <audio>
  const source = doc.querySelector('source[src*=".mp3"], audio[src*=".mp3"]');
  if (source) {
    const src = source.getAttribute('src');
    return src.startsWith('http') ? src : `${BASE}${src.startsWith('/') ? '' : '/'}${src}`;
  }
  // Check links
  const links = doc.querySelectorAll('a[href*=".mp3"]');
  if (links.length > 0) {
    const href = links[0].getAttribute('href');
    return href.startsWith('http') ? href : `${BASE}${href.startsWith('/') ? '' : '/'}${href}`;
  }
  // Check in raw HTML
  const raw = doc.documentElement.innerHTML;
  const match = raw.match(/https?:\/\/[^\s"'<>]+\.mp3/i);
  return match ? match[0] : null;
}

// ── Icon Helper ──
const iconPlay = btnPlay.querySelector('.icon-play');
const iconPause = btnPlay.querySelector('.icon-pause');
function setPlayIcon(playing) {
  iconPlay.style.display = playing ? 'none' : '';
  iconPause.style.display = playing ? '' : 'none';
}

// ── Audio Playback ──
function startAudio(mp3Url, title) {
  audio.src = mp3Url;
  progressBar.classList.add('has-audio');
  audio.play().then(() => {
    isPlaying = true;
    setPlayIcon(true);
  }).catch(() => {
    isPlaying = false;
    setPlayIcon(false);
  });
}

// ── Preload next track ──
const preloadAudio = new Audio();
function preloadNext() {
  if (currentIndex < programs.length - 1) {
    const next = programs[currentIndex + 1];
    if (next && next.mp3) {
      preloadAudio.src = next.mp3;
      preloadAudio.preload = 'auto';
    }
  }
}

// ── Player Controls ──
btnPlay.addEventListener('click', () => {
  // If nothing is playing yet, play the first item
  if (!audio.src || audio.src === location.href) {
    if (programs.length > 0) {
      playProgram(0);
    } else {
      // Home page: click the first program item
      const firstItem = programList.querySelector('.program-item[data-href]');
      if (firstItem) firstItem.click();
    }
    return;
  }
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    setPlayIcon(false);
  } else {
    audio.play();
    isPlaying = true;
    setPlayIcon(true);
  }
});

btnPrev.addEventListener('click', () => {
  if (currentIndex > 0) playProgram(currentIndex - 1);
});

btnNext.addEventListener('click', () => {
  if (currentIndex < programs.length - 1) playProgram(currentIndex + 1);
});

// Auto-play next
audio.addEventListener('ended', () => {
  if (currentIndex < programs.length - 1) {
    playProgram(currentIndex + 1);
  } else {
    isPlaying = false;
    setPlayIcon(false);
  }
});

// ── Progress Bar ──
const progressThumb = document.getElementById('progressThumb');
let isDragging = false;

function updateProgress(pct) {
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration || isDragging) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  updateProgress(pct);
  timeCurrent.textContent = formatTime(audio.currentTime);
  timeDuration.textContent = formatTime(audio.duration);
});

audio.addEventListener('canplay', preloadNext, { once: false });

function seekFromEvent(e) {
  if (!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  updateProgress(pct * 100);
  audio.currentTime = pct * audio.duration;
  timeCurrent.textContent = formatTime(audio.currentTime);
}

// Mouse drag
progressBar.addEventListener('mousedown', e => {
  if (!audio.duration) return;
  isDragging = true;
  seekFromEvent(e);
});
document.addEventListener('mousemove', e => { if (isDragging) seekFromEvent(e); });
document.addEventListener('mouseup', () => { isDragging = false; });

// Touch drag
progressBar.addEventListener('touchstart', e => {
  if (!audio.duration) return;
  isDragging = true;
  seekFromEvent(e);
}, { passive: true });
document.addEventListener('touchmove', e => { if (isDragging) seekFromEvent(e); }, { passive: true });
document.addEventListener('touchend', () => { isDragging = false; });

audio.addEventListener('play', () => { isPlaying = true; setPlayIcon(true); });
audio.addEventListener('pause', () => { isPlaying = false; setPlayIcon(false); });

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

renderChips();
